<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Homepage - FoodSafe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url(homepagebg.png);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* homepage */

        .homepage-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .title-text {
            font-size: 7rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -1px;
            animation: fadeIn 1.5s ease-out forwards;
        }

        .titlecolor-orange {
            color: #f38020;
            font-weight: 730;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 40px;
            animation: fadeIn 1.5s ease-out forwards;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }

        .button-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap; 
        }

        .btn-pill {
            background-color: #ffffff;
            color: #f38020;
            border: 2px solid transparent;
            border-radius: 50px;
            padding: 15px 32px;
            font-size: 1.3rem;
            font-weight: 600;
            text-decoration: none;
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-pill:hover {
            background-color: #f38020;
            color: #ffffff;
            border-color: #ffffff;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            } to {
                opacity: 1;
            }
        }

        /*mobile*/
        
        @media (max-width: 768px) {
            .title-text {
                font-size: 3rem;
                line-height: 1.1;
            }

            .subtitle {
                font-size: 1.5rem;
                margin-bottom: 30px;
            }

            .button-row {
                flex-direction: column;
                width: 100%;
                max-width: 350px;
            }

            .btn-pill {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header id="navbar-placeholder">
    </header>

    <main class="homepage-main">
        <h1 class="title-text">Welcome, <span class="titlecolor-orange">Admin</span></h1>
        
        <p class="subtitle">What would you like to focus on?</p>

        <div class="button-container">
            <div class="button-row">
                <a href="user_management.html" class="btn-pill">User Management</a>
                <a href="restaurant_management.html" class="btn-pill">Restaurant Management</a>
                <a href="export_data.html" class="btn-pill">Export System Data</a>
            </div>
            <div class="button-row">
                <a href="website_report.html" class="btn-pill">Check Website Report</a>
            </div>
        </div>
    </main>
</body>
</html>
