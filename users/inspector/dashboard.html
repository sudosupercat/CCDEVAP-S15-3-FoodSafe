<!DOCTYPE html>
    <head>
        <meta name="description" content="FoodSafe Inspector Dashboard">
        <meta name="keywords" content="FoodSafe, Inspector, Dashboard ">
        <meta name="author" content="CCDEVAP Group 3">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="../../src/images/logo-tab.png">
        <link rel="stylesheet" href="../../styles/bootstrap-4.6.2-dist/css/bootstrap.css">
        <link rel="stylesheet" href="../../styles/css/inspector/dashboard.css">
        <link rel="stylesheet" href="../../styles/css/global.css">
        <script src="../../styles/js/nav-bar.js"></script>
        <script src="../../styles/js/jquery-3.7.1.min.js"></script>
        <script src="../../styles/bootstrap-4.6.2-dist/js/bootstrap.js"></script>
        <title>FoodSafe Inspector Dashboard</title>
    </head>
    <body class="inspector-dashboard">
        <header>
            <div id="navBar"></div>   
        </header>
            <div class="page-header">
                <h1>Inspector Dashboard</h1>
            </div>
        <main>
            <section class="stats-row">
                <div class="stat-box1">
                    <h2>150</h2>
                    <p>Total Inspections Done</p>
                </div>
                <div class="stat-box2">
                    <h2>25</h2>
                    <p>Pending Reports</p>
                </div>
            </section> 

            <section class="charts-row">
                <div class="chart-box1">
                    <h2>Inspections Per Month</h2>
                    <!-- Placeholder for chart -->
                    <div class="chart-placeholder">
                        <canvas id="inspectionsChart"></canvas>
                    </div>
                </div>
                <div class="chart-box2">
                    <h2>Grade Distribution</h2>
                    <!-- Placeholder for chart -->
                    <div class="chart-placeholder">
                        <canvas id="gradeDistributionChart"></canvas>
                    </div>
                </div>
            </section>
            
        </main>
        <script src="../../script/inspectorDashboard.js"></script>
    </body>
</html>
