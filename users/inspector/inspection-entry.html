<!DOCTYPE html>
<html>
    <head>
        <title>Business Directory</title>
        <link rel="stylesheet" href="inspection-entry.css">
    </head>
    <body>
        <!-- nav here -->
        <h1>Log Inspection Entry</h1>
        <div class="form-container">
            <form>
                <label for="restaurant">Restaurant:</label>
                <select name="restaurant" id="restaurant">
                    <option value="1">Fowler Diner</option>
                    <option value="2">Krusty Krab</option>
                    <option value="3">McDollibee</option>
                </select>
                <label for="inspection-date">Date of Inspection:</label>
                <input type="date" name="inspection-date" id="inspection-date">
                <div class="violation-form">
                    <label for="restaurant">Violation Type:</label>
                    <select name="restaurant" id="restaurant">
                        <option value="1">Dirty Kitchen</option>
                        <option value="2">Pest Infestation</option>
                        <option value="3">Improper disinfection</option>
                    </select>
                    <label for="score">Score:</label>
                    <select name="score" id="restaurant">
                        <option value="1"></option>
                        <option value="2">Pest Infestation</option>
                        <option value="3">Improper Disinfection</option>
                    </select>
                    <label for="pass">Pass</label>
                    <input type="radio" id="pass" name="grade" value="Pass">
                    <label for="fail">Fail:</label>
                    <input type="radio" id="fail" name="grade" value="Fail">
                    <label for="remarks">Remarks:</label>
                    <input type="text" name="remarks" id="remarks">
                </div>
            </form>
        </div>
    </body>
</html>
