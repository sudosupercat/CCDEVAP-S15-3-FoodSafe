<!DOCTYPE html>
<html lang="en">
    <head>
        <title>FoodSafe - Edit Business</title>
        <link rel="stylesheet" href="business-directory.css">
        <link rel="stylesheet" href="../../styles/bootstrap-4.6.2-dist/css/bootstrap.css">
        <link rel="stylesheet" href="../../styles/css/global.css">
        <script src="../../styles/js/jquery-3.7.1.min.js"></script>
        <script src="../../styles/bootstrap-4.6.2-dist/js/bootstrap.js"></script>
        <script src="../../styles/js/popper.min.js"></script>
        <script src="../../styles/js/nav-bar.js"></script>
        <script src="../../styles/js/inspector/business-directory.js"></script>
    </head>
    <body>
        <div id="navBar"></div>
        <h1 class="mt-4 mb-4 font-weight-bold">Add Business Entry</h1>

        <div class="container mt-5">
        <form id="add-business-form">
            <div class="form-group">
                <label for="license-number">License Number</label>
                <input type="num" class="form-control" id="licenseNumber" name="licenseNumber" required>
            </div>
            <div class="form-group">
                <label for="business-name">Food Business Name</label>
                <input type="text" class="form-control" id="business-name" name="business-name" required>
            </div>
            <div class="form-group">
                <label for="business-address">Business Address</label>
                <input type="text" class="form-control" id="business-address" name="business-address" required>
            </div>
            <div class="form-group">
                <label for="contact-number">Contact No.</label>
                <input type="tel" class="form-control" id="contact-number" name="contact-number"
                    pattern="[0-9]{10}" placeholder="Enter Philippine 10-digit number" required>
            </div>
            <div class="form-group">
                  <label for="establishment-image">Image of Business Establishment</label>
                  <input type="file" class="form-control-file" id="establishment-image" name="establishment-image" accept="image/*">
            </div>
            <div class="form-group">
                <label for="googleMapsLink">Google Maps Link</label>
                <input type="url" class="form-control" id="maps-link" name="maps-link" placeholder="https://maps.google.com/..." >
            </div>
            <button type="submit" class="btn btn-primary">Save Entry</button>
          </form>
        </div>

        <footer class="site-footer">
            FoodSafe - Copyright 2026
        </footer>
    </body>
    </html>
